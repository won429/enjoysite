    <style>
        /* 🔥 구단별 다이내믹 테마 색상 🔥 */
        :root {
            --point-color: #3182F6;
            --point-bg: rgba(49, 130, 246, 0.15);
            --app-bg: #000000;
        }
        body[data-theme="KIA"] { --point-color: #ea0029; --point-bg: rgba(234, 0, 41, 0.15); --app-bg: #140003; }
        body[data-theme="삼성"] { --point-color: #2563eb; --point-bg: rgba(37, 99, 235, 0.15); --app-bg: #000514; }
        body[data-theme="all"] { --point-color: #3182F6; --point-bg: rgba(49, 130, 246, 0.15); --app-bg: #000000; }

        .app-bg { background-color: var(--app-bg) !important; transition: background-color 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .text-point { color: var(--point-color) !important; transition: color 0.5s ease; }
        .bg-point { background-color: var(--point-color) !important; transition: background-color 0.5s ease; }
        .bg-point-sub { background-color: var(--point-bg) !important; transition: background-color 0.5s ease; }

        body { 
            font-family: 'Pretendard', sans-serif;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
            touch-action: pan-y;
        }

        /* 🔥 바텀 시트 배경 (투명도 완벽 제거 및 깔끔한 솔리드 컬러) 🔥 */
        .toss-card {
            background: #1C1C1E; /* 반투명 rgba 대신 완전한 불투명 컬러 적용 */
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 -4px 32px rgba(0, 0, 0, 0.5); /* 팝업이 위로 올라오니 그림자도 위쪽으로 자연스럽게 수정 */
        }

        .list-card { background: #1C1C1E; border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 20px; transition: transform 0.1s; }
        .list-card:active { transform: scale(0.97); background: #2C2C2E; }

        .pt-safe { padding-top: max(20px, env(safe-area-inset-top)); }
        .pt-main { padding-top: calc(max(20px, env(safe-area-inset-top)) + 70px); }

        #nav-indicator { will-change: transform, width; }
        .nav-transition { transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1), width 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); }
        
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        .ctrl-item { transition: max-width 0.5s cubic-bezier(0.25, 1, 0.5, 1), padding 0.5s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.4s ease; overflow: hidden; white-space: nowrap; width: max-content; justify-self: end; }
        .ctrl-show { max-width: 200px; opacity: 1; padding-left: 16px; padding-right: 16px; }
        .ctrl-hide { max-width: 0px; opacity: 0; padding-left: 0px; padding-right: 0px; pointer-events: none; }

        /* 🔥 촐싹대는 애니메이션 빼고 스르륵(ease-out) 부드럽게 올라오도록 수정 🔥 */
        #bottom-sheet { transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.3s; transform: translate(-50%, 120%); opacity: 0; }
        #bottom-sheet.show { transform: translate(-50%, 0); opacity: 1; }

        .calendar-day { aspect-ratio: 1 / 1.2; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 14px; border-radius: 12px; transition: all 0.2s; }
        .calendar-day:active { transform: scale(0.92); }
        .has-match { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); }
        .today { background: var(--point-bg) !important; border: 1px solid var(--point-color) !important; }

        /* 🔥 실시간 펄스 애니메이션 (진행 중인 경기 표시용) 🔥 */
        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(234, 0, 41, 0.7); }
            70% { box-shadow: 0 0 0 6px rgba(234, 0, 41, 0); }
            100% { box-shadow: 0 0 0 0 rgba(234, 0, 41, 0); }
        }
        .live-badge { animation: pulse-ring 2s infinite; }
    </style>

                </div>

            '키움': 'https://i.namu.wiki/i/qNJ-4pGmvhJmKVoGIAR9uce83_Mayu1vsHyd37yK6raEmYcHSiW3MGgFqkihanigvyFK3LVoAwIgZvGr5ymW4ksC5bB643HgAHTkEGoLyrqiL1TRzXrzrNhN1PJPi7I8pGTDfLbyUyNEDj65MsNedw.svg'
        };

        let currentDate = new Date();
        const todayStr = `${currentDate.getFullYear()}-${String(currentDate.getMonth() + 1).padStart(2, '0')}-${String(currentDate.getDate()).padStart(2, '0')}`;
        let viewMode = 'month';
        let selectedTeam = localStorage.getItem('kbo_selected_team') || 'all';

        // 🔥 서버 통신 및 실시간 점수 리스너 등록 🔥
        async function syncWithFirestore() {
            try {
                // 1. 앱 켜질 때 기본 일정/순위 데이터 로드
                const [matchesSnap, rankingsSnap] = await Promise.all([
                    db.collection("matches").get(),
                    db.collection("rankings").get()
                ]);

                if (matchesSnap.empty) scheduleData = [...initialScheduleData];
                else scheduleData = matchesSnap.docs.map(doc => doc.data()).sort((a, b) => a.date.localeCompare(b.date));

                if (rankingsSnap.empty) rankingData = [...initialRankingData];
                else rankingData = rankingsSnap.docs.map(doc => doc.data()).sort((a, b) => a.team.localeCompare(b.team));

                // 2. 🚀 파이어베이스 핵심 기능: onSnapshot (실시간 데이터 변경 감지) 🚀
                // 깃허브 봇이 15분마다 파이어베이스에 점수를 올리면, 이 코드가 그걸 자동으로 캐치함!
                db.collection("lineups").onSnapshot((snapshot) => {
                    snapshot.forEach(doc => {
                        liveDataStore[doc.id] = doc.data(); // 최신 실시간 데이터 저장
                    });
                    
                    // 데이터가 바뀌었으니 현재 보고 있는 화면을 '새로고침 없이' 즉시 다시 그림
                    if (currentTabIndex === 0) renderCalendar();
                    else if (currentTabIndex === 1) renderList();
                    
                    // 매치 팝업이 열려있는 상태라면 팝업 안의 점수도 즉시 갱신!
                    if (currentPopupMatchId) {
                        renderPopupContent(currentPopupMatchId);
                    }
                });

            } catch (error) {
                console.error("파이어베이스 통신 에러:", error);
                scheduleData = [...initialScheduleData]; rankingData = [...initialRankingData];
            }
        }

        function switchTab(index) {
            currentTabIndex = index;
            if (navigator.vibrate) navigator.vibrate(10);
            const screens = [document.getElementById('calendar-screen'), document.getElementById('list-screen'), document.getElementById('ranking-screen')];
            closeBottomSheet();

            const navButtons = document.querySelectorAll('#bottom-nav button');
            const indicator = document.getElementById('nav-indicator');

            if(navButtons[index] && indicator) {
                indicator.style.width = `${navButtons[index].offsetWidth}px`;
                indicator.style.transform = `translateX(${navButtons[index].offsetLeft - 4}px)`;
            }

            navButtons.forEach((btn, i) => {
                const icon = btn.querySelector('i'); const label = btn.querySelector('span');
                if (icon && label) {
                    icon.className = `fa-solid ${i===0?'fa-calendar-days':(i===1?'fa-list-ul':'fa-trophy')} text-base ${i===index?'text-white':'text-gray-300 transition-colors'}`;
                    label.className = `text-[10px] whitespace-nowrap transition-colors ${i===index?'text-white font-bold':'text-gray-300 font-medium'}`;
                }
            });

            const ctrlTeam = document.getElementById('ctrl-team'); const ctrlSort = document.getElementById('ctrl-sort');
            const ctrlWrapper = document.getElementById('ctrl-wrapper'); const mainText = document.getElementById('di-main-text');

            if (index === 0) mainText.innerHTML = `KBO 리그<span class="w-1 h-1 bg-point rounded-full ml-1 mb-0.5"></span>`;
            else if (index === 1) mainText.innerHTML = `전체 일정 목록<span class="w-1 h-1 bg-point rounded-full ml-1 mb-0.5"></span>`;
            else if (index === 2) mainText.innerHTML = `정규리그 순위<span class="w-1 h-1 bg-point rounded-full ml-1 mb-0.5"></span>`;

            if (index === 0) { ctrlTeam.className='ctrl-item ctrl-show flex items-center justify-center gap-1 h-full'; ctrlSort.className='ctrl-item ctrl-hide flex items-center justify-center gap-1 h-full'; ctrlWrapper.classList.remove('opacity-0'); }
            else if (index === 1) { ctrlTeam.className='ctrl-item ctrl-hide flex items-center justify-center gap-1 h-full'; ctrlSort.className='ctrl-item ctrl-show flex items-center justify-center gap-1 h-full'; ctrlWrapper.classList.remove('opacity-0'); }
            else if (index === 2) { ctrlTeam.className='ctrl-item ctrl-hide flex items-center justify-center gap-1 h-full'; ctrlSort.className='ctrl-item ctrl-hide flex items-center justify-center gap-1 h-full'; ctrlWrapper.classList.add('opacity-0'); }

            screens.forEach((screen, i) => { screen.classList.toggle('hidden', i !== index); screen.classList.toggle('flex', i === index); });

            if (index === 0) renderCalendar(); else if (index === 1) renderList(); else if (index === 2) renderRanking();
        }

        // 🔥 삭제했던 월간/주간 버튼 불빛 스위치 로직 완벽 복구 🔥
        function setViewMode(mode) { 
            viewMode = mode; 
            const btnMonth = document.getElementById('btn-mode-month');
            const btnWeek = document.getElementById('btn-mode-week');
            
            if (mode === 'month') {
                btnMonth.className = 'px-3 py-1 text-xs font-bold rounded-full bg-point text-white transition-all';
                btnWeek.className = 'px-3 py-1 text-xs font-medium rounded-full text-gray-400 hover:text-white transition-all';
            } else {
                btnWeek.className = 'px-3 py-1 text-xs font-bold rounded-full bg-point text-white transition-all';
                btnMonth.className = 'px-3 py-1 text-xs font-medium rounded-full text-gray-400 hover:text-white transition-all';
            }
            
            renderCalendar(); 
            closeBottomSheet(); 
        }
        
        function setTeamFilter(team) {
            selectedTeam = team; localStorage.setItem('kbo_selected_team', team); document.body.setAttribute('data-theme', team);
            const btns = ['all', 'KIA', '삼성'].map(id => document.getElementById(`btn-team-${id}`));
            btns.forEach(btn => btn.className = 'px-2.5 py-1 text-[11px] font-medium rounded-full text-gray-400 hover:text-white transition-all');
            document.getElementById(`btn-team-${team}`).className = 'px-2.5 py-1 text-[11px] font-bold rounded-full bg-point text-white shadow-sm transition-all';
            renderCalendar(); if(currentTabIndex === 1) renderList(); closeBottomSheet();
        }

        // --- UI 렌더링 함수들 ---

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            if(!grid) return; grid.innerHTML = '';
            
            const year = currentDate.getFullYear(); const month = currentDate.getMonth();
            if (viewMode === 'month') {
                document.getElementById('week-days-header').classList.remove('hidden');
                grid.className = 'grid grid-cols-7 gap-2';
                document.getElementById('calendar-title').innerText = `${year}년 ${month + 1}월`;
                const firstDay = new Date(year, month, 1).getDay(); const daysInMonth = new Date(year, month + 1, 0).getDate();
                for (let i = 0; i < firstDay; i++) grid.innerHTML += `<div class="calendar-day opacity-0 pointer-events-none"></div>`;
                
                for (let i = 1; i <= daysInMonth; i++) {
                    const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                    let matchesToday = scheduleData.filter(m => m.date === dateStr && (selectedTeam === 'all' || m.team1 === selectedTeam || m.team2 === selectedTeam));
                    let isToday = (dateStr === todayStr);
                    
                    // 🔥 날려먹었던 디테일 완벽 복구: +N 배지 & 상대팀 로고 & HOME 아이콘 🔥
                    let dotsHtml = '';
                    let topIconHtml = '';
                    
                    if (matchesToday.length > 0) {
                        if (selectedTeam === 'all') {
                            // 전체 보기 모드: +5 경기 갯수 배지
                            dotsHtml = `
                                <div class="flex justify-center items-center gap-1 mt-auto mb-1.5 bg-white/10 px-2 py-0.5 rounded-full border border-white/10 shadow-sm">
                                    <i class="fa-solid fa-baseball text-gray-300 text-[9px]"></i>
                                    <span class="text-[10px] font-bold text-white">+${matchesToday.length}</span>
                                </div>`;
                        } else {
                            // 특정 팀 보기 모드: 상대팀 로고 및 홈/어웨이 표시
                            let dots = matchesToday.map(match => {
                                let displayTeam = match.team1 === selectedTeam ? match.team2 : match.team1;
                                let isHome = match.team2 === selectedTeam;
                                let logo = teamLogos[displayTeam];
                                let logoHtml = logo ? `<img src="${logo}" class="w-5 h-5 object-contain">` : `<div class="w-1.5 h-1.5 rounded-full ${teamColors[displayTeam] || 'bg-gray-500'}"></div>`;
                                if (isHome) topIconHtml = `<i class="fa-solid fa-house text-point text-[10px] absolute top-1.5 left-1/2 -translate-x-1/2"></i>`;
                                return logoHtml;
                            }).join('');
                            dotsHtml = `<div class="flex justify-center gap-0.5 items-center mt-auto mb-1.5">${dots}</div>`;
                        }
                    }

                    grid.innerHTML += `
                        <div class="calendar-day cursor-pointer relative ${matchesToday.length ? 'has-match' : ''} ${isToday ? 'today' : ''}" onclick="openDateSheet('${dateStr}')">
                            ${topIconHtml}
                            <span class="text-[13px] relative z-10 ${isToday?'text-point font-extrabold':(matchesToday.length?'text-white font-bold':'text-gray-400')}">${i}</span>
                            ${dotsHtml}
                        </div>`;
                }
            } else {
                // 🔥 삭제했던 주간(Week) 달력 뷰 완벽하게 원상복구 및 실시간 점수 연동 🔥
                document.getElementById('week-days-header').classList.add('hidden');
                grid.className = 'flex flex-col gap-6 pb-4 w-full col-span-7';

                let startOfWeek = new Date(currentDate);
                startOfWeek.setDate(currentDate.getDate() - currentDate.getDay());

                let thursday = new Date(startOfWeek);
                thursday.setDate(thursday.getDate() + 4);

                let firstDayOfMonth = new Date(thursday.getFullYear(), thursday.getMonth(), 1).getDay();
                let weekNum = Math.ceil((thursday.getDate() + firstDayOfMonth) / 7);

                document.getElementById('calendar-title').innerText = `${thursday.getFullYear()}년 ${thursday.getMonth() + 1}월 ${weekNum}주차`;

                let weekDays = [];
                for (let i = 0; i < 7; i++) {
                    let d = new Date(startOfWeek);
                    d.setDate(d.getDate() + i);
                    const y = d.getFullYear();
                    const m = String(d.getMonth() + 1).padStart(2, '0');
                    const dayStr = String(d.getDate()).padStart(2, '0');
                    const dateStr = `${y}-${m}-${dayStr}`;

                    let matchesToday = scheduleData.filter(match => match.date === dateStr && (selectedTeam === 'all' || match.team1 === selectedTeam || match.team2 === selectedTeam));
                    weekDays.push({ d, dateStr, matches: matchesToday });
                }

                let idx = 0;
                while (idx < 7) {
                    let currentDay = weekDays[idx];
                    if (currentDay.matches.length > 0) {
                        let matchesHtml = `<div class="space-y-3">` + currentDay.matches.map(match => {
                            let isHome = selectedTeam !== 'all' && match.team2 === selectedTeam;
                            let logo1 = teamLogos[match.team1] ? `<img src="${teamLogos[match.team1]}" class="w-6 h-6 object-contain">` : `<div class="w-3 h-3 rounded-full ${teamColors[match.team1] || 'bg-gray-500'}"></div>`;
                            let logo2 = teamLogos[match.team2] ? `<img src="${teamLogos[match.team2]}" class="w-6 h-6 object-contain">` : `<div class="w-3 h-3 rounded-full ${teamColors[match.team2] || 'bg-gray-500'}"></div>`;

                            const live = liveDataStore[match.id];
                            let statusHtml = `<span class="text-[10px] text-gray-400 font-bold"><i class="fa-solid fa-clock mr-1"></i>${match.time} · ${isHome ? `<i class="fa-solid fa-house text-point mx-0.5"></i>` : ''}${match.stadium}</span>`;
                            let scoreHtml = `<span class="text-xs text-gray-500">vs</span>`;

                            if (live && live.gameStatus !== '경기전') {
                                let badgeClass = live.gameStatus === '종료' ? 'bg-gray-600' : 'bg-red-600 live-badge';
                                statusHtml = `<div class="flex items-center gap-1.5"><span class="${badgeClass} text-[9px] font-bold text-white px-1.5 py-0.5 rounded-sm">${live.gameStatus}</span><span class="text-[10px] text-gray-400 font-bold">${match.stadium}</span></div>`;
                                scoreHtml = `<span class="text-sm font-black ${live.awayScore > live.homeScore ? 'text-point' : 'text-white'}">${live.awayScore}</span><span class="text-xs text-gray-500 mx-1">:</span><span class="text-sm font-black ${live.homeScore > live.awayScore ? 'text-point' : 'text-white'}">${live.homeScore}</span>`;
                            }

                            return `
                                <div class="bg-white/5 border border-white/5 rounded-xl p-3 flex justify-between items-center cursor-pointer active:scale-95 transition-transform" onclick="openLineupPopup(${match.id})">
                                    <div class="flex flex-col gap-1 w-full">
                                        ${statusHtml}
                                        <div class="flex items-center justify-between mt-1">
                                            <div class="flex items-center gap-1.5 w-[40%]">${logo1}<span class="text-sm font-bold text-white truncate">${match.team1}</span></div>
                                            <div class="flex items-center justify-center w-[20%]">${scoreHtml}</div>
                                            <div class="flex items-center justify-end gap-1.5 w-[40%]"><span class="text-sm font-bold text-white truncate">${match.team2}</span>${logo2}</div>
                                        </div>
                                    </div>
                                </div>`;
                        }).join('') + `</div>`;

                        grid.innerHTML += `
                            <div class="flex flex-col gap-3">
                                <div class="flex items-center gap-2">
                                    <h3 class="text-lg font-bold ${currentDay.dateStr === todayStr ? 'text-point' : 'text-white'}">${currentDay.d.getMonth() + 1}월 ${currentDay.d.getDate()}일 일정</h3>
                                    <span class="text-[10px] font-bold text-point bg-point-sub px-2 py-0.5 rounded-full">${currentDay.matches.length}경기</span>
                                </div>
                                ${matchesHtml}
                            </div>`;
                        idx++;
                    } else {
                        let startIdx = idx;
                        while (idx < 7 && weekDays[idx].matches.length === 0) idx++;
                        let endIdx = idx - 1;
                        let startDay = weekDays[startIdx];
                        let endDay = weekDays[endIdx];
                        let isTodayInRange = false;
                        for (let k = startIdx; k <= endIdx; k++) {
                            if (weekDays[k].dateStr === todayStr) isTodayInRange = true;
                        }
                        let titleColor = isTodayInRange ? 'text-point' : 'text-white';
                        let titleHtml = startIdx === endIdx
                            ? `<h3 class="text-lg font-bold ${titleColor}">${startDay.d.getMonth() + 1}월 ${startDay.d.getDate()}일</h3>`
                            : `<h3 class="text-lg font-bold ${titleColor}">${startDay.d.getMonth() + 1}월 ${startDay.d.getDate()}일 ~ ${endDay.d.getMonth() + 1}월 ${endDay.d.getDate()}일</h3>`;

                        grid.innerHTML += `
                            <div class="flex flex-col gap-3">
                                <div class="flex items-center gap-2">
                                    ${titleHtml}
                                    <span class="text-[10px] font-bold text-gray-400 bg-white/10 px-2 py-0.5 rounded-full border border-white/5">일정 없음</span>
                                </div>
                                <div class="text-[12px] text-gray-500 bg-white/5 rounded-xl p-5 text-center border border-white/5 flex flex-col items-center justify-center gap-2">
                                    <i class="fa-solid fa-bed text-2xl text-gray-600 mb-1"></i>
                                    이 기간에는 예정된 경기가 없습니다.
                                </div>
                            </div>`;
                    }
                }
            }
        }

        function openDateSheet(dateStr) {
            let matches = scheduleData.filter(m => m.date === dateStr && (selectedTeam === 'all' || m.team1 === selectedTeam || m.team2 === selectedTeam));
            const sheet = document.getElementById('bottom-sheet'); const container = document.getElementById('sheet-matches-container');
            const [y, m, d] = dateStr.split('-');
            document.getElementById('sheet-date-title').innerText = `${parseInt(m)}월 ${parseInt(d)}일 일정`;
            document.getElementById('sheet-match-count').innerText = matches.length > 0 ? `${matches.length}경기` : '일정 없음';
            container.innerHTML = '';

            if (matches.length === 0) {
                container.innerHTML = `<div class="flex flex-col items-center justify-center py-6 text-gray-500"><i class="fa-regular fa-calendar-xmark text-3xl mb-2"></i><p class="text-sm">이 날은 예정된 경기가 없습니다.</p></div>`;
            } else {
                matches.forEach(match => {
                    const live = liveDataStore[match.id]; // 🔥 실시간 데이터 매칭
                    let statusHtml = `<span class="text-[10px] text-gray-400 font-bold"><i class="fa-solid fa-clock mr-1"></i>${match.time}</span>`;
                    
                    // 경기 중이거나 종료된 경우 실시간 점수로 덮어쓰기!
                    if (live && live.gameStatus !== '경기전') {
                        let badgeClass = live.gameStatus === '종료' ? 'bg-gray-600' : 'bg-red-600 live-badge';
                        statusHtml = `<div class="flex items-center gap-1.5"><span class="${badgeClass} text-[9px] font-bold text-white px-1.5 py-0.5 rounded-sm">${live.gameStatus}</span><span class="text-[10px] text-gray-400 font-bold">${live.awayScore}:${live.homeScore}</span></div>`;
                    }

                    // 🔥 명령하신 대로 바텀 시트 일정 목록에 구단 로고 추가! (다른 건 일절 안 건드림!) 🔥
                    let logo1 = teamLogos[match.team1] ? `<img src="${teamLogos[match.team1]}" class="w-6 h-6 object-contain">` : `<div class="w-6 h-6 rounded-full ${teamColors[match.team1] || 'bg-gray-600'} flex items-center justify-center text-white text-[10px] font-bold">${match.team1.substring(0,1)}</div>`;
                    let logo2 = teamLogos[match.team2] ? `<img src="${teamLogos[match.team2]}" class="w-6 h-6 object-contain">` : `<div class="w-6 h-6 rounded-full ${teamColors[match.team2] || 'bg-gray-600'} flex items-center justify-center text-white text-[10px] font-bold">${match.team2.substring(0,1)}</div>`;

                    container.innerHTML += `
                        <div class="bg-white/5 border border-white/5 rounded-xl p-3 flex justify-between items-center cursor-pointer active:scale-95 transition-transform" onclick="openLineupPopup(${match.id})">
                            <div class="flex flex-col gap-1">
                                ${statusHtml}
                                <div class="flex items-center gap-2 mt-0.5">
                                    <div class="flex items-center gap-1.5">${logo1}<span class="text-sm font-bold text-white">${match.team1}</span></div>
                                    <span class="text-[11px] text-gray-500 font-bold">vs</span>
                                    <div class="flex items-center gap-1.5"><span class="text-sm font-bold text-white">${match.team2}</span>${logo2}</div>
                                </div>
                            </div>
                            <button class="w-8 h-8 rounded-full bg-white/5 text-gray-400 hover:text-white flex items-center justify-center text-xs shrink-0"><i class="fa-solid fa-chevron-right"></i></button>
                        </div>`;
                });
            }
            sheet.classList.add('show');
        }

        function closeBottomSheet() { const sheet = document.getElementById('bottom-sheet'); if (sheet) sheet.classList.remove('show'); }

        // 🔥 2번 탭: 목록 화면 (실시간 점수판 크게 적용) 🔥
        function renderList() {
            const container = document.getElementById('match-list-container');

            let filteredData = scheduleData.filter(m => selectedTeam === 'all' || m.team1 === selectedTeam || m.team2 === selectedTeam);

                card.className = `list-card p-4 cursor-pointer relative overflow-hidden`;

                let scoreBoardHtml = `
                    <div class="flex items-center gap-2 mt-1">
                        <div class="flex items-center gap-2">${logo1}<span class="text-[17px] font-bold text-white tracking-wide">${match.team1}</span></div>
                        <span class="text-sm text-gray-500 font-bold mx-1">vs</span>
                        <div class="flex items-center gap-2"><span class="text-[17px] font-bold text-white tracking-wide">${match.team2}</span>${logo2}</div>
                    </div>`;

                // 🔥 경기 중 / 종료 상태일 경우 실시간 점수판으로 완전히 교체! 🔥
                if (live && live.gameStatus !== '경기전') {
                    let badgeClass = live.gameStatus === '종료' ? 'bg-gray-600' : 'bg-red-600 live-badge';
                    headerHtml = `<div class="flex items-center gap-2"><span class="text-[10px] font-bold text-white ${badgeClass} px-2 py-0.5 rounded-sm tracking-widest">${live.gameStatus}</span><span class="text-[12px] text-gray-400 font-bold">${match.stadium}</span></div>`;
                    
                    scoreBoardHtml = `
                    <div class="flex items-center justify-between mt-1 bg-white/5 rounded-xl p-2.5 border border-white/5 shadow-inner">
                        <div class="flex items-center gap-2 w-[35%]">${logo1}<span class="text-[15px] font-bold text-white truncate">${match.team1}</span></div>
                        <div class="flex items-center justify-center gap-2 w-[30%]">
                            <span class="text-2xl font-black ${live.awayScore > live.homeScore ? 'text-point' : 'text-white'}">${live.awayScore}</span>
                            <span class="text-sm text-gray-500">:</span>
                            <span class="text-2xl font-black ${live.homeScore > live.awayScore ? 'text-point' : 'text-white'}">${live.homeScore}</span>
                        </div>
                        <div class="flex items-center justify-end gap-2 w-[35%]"><span class="text-[15px] font-bold text-white truncate">${match.team2}</span>${logo2}</div>
                    </div>`;
                }

                card.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-[10px] font-bold text-point bg-point-sub px-2 py-0.5 rounded-full">${match.date}</span>
                    </div>
                    <div class="flex flex-col gap-1.5">
                        ${headerHtml}
                        ${scoreBoardHtml}
                    </div>`;
                wrapper.appendChild(card);
            });
            container.appendChild(wrapper);
        }

        function renderRanking() {
            const container = document.getElementById('ranking-container');
            if (!container) return;

            let html = `
                <div class="px-5">
                    <div>
                        <div class="flex justify-between items-center p-3 border-b border-white/20">
                            <div class="w-10 text-center text-xs font-bold text-gray-400">순위</div>
                            <div class="flex-1 text-left text-xs font-bold text-gray-400 pl-2">팀명</div>
                            <div class="w-8 text-center text-xs font-bold text-gray-400">승</div>
                            <div class="w-8 text-center text-xs font-bold text-gray-400">패</div>
                            <div class="w-12 text-center text-xs font-bold text-gray-400">승률</div>
                            <div class="w-10 text-center text-xs font-bold text-gray-400">승차</div>
                        </div>`;

            rankingData.forEach((team, i) => {
                let rClass = team.rank === '-' ? 'text-gray-400' : (i === 0 ? 'text-yellow-400' : (i <= 4 ? 'text-white' : 'text-gray-400'));
                let logo = teamLogos[team.team];
                let teamIconHtml = logo ? `<img src="${logo}" class="w-6 h-6 object-contain shrink-0">` : `<div class="w-3 h-3 rounded-full ${teamColors[team.team] || 'bg-gray-500'} shrink-0"></div>`;

                html += `
                        <div class="flex justify-between items-center p-3 border-b border-white/5 last:border-0 hover:bg-white/5 transition-colors">
                            <div class="w-10 text-center text-sm font-bold ${rClass}">${team.rank}</div>
                            <div class="flex-1 flex items-center gap-2 pl-2">${teamIconHtml}<span class="text-sm font-bold text-white">${team.team}</span></div>
                            <div class="w-8 text-center text-sm font-medium text-gray-300">${team.w}</div>
                            <div class="w-8 text-center text-sm font-medium text-gray-300">${team.l}</div>
                            <div class="w-12 text-center text-sm font-medium text-point">${team.winRate}</div>
                            <div class="w-10 text-center text-[11px] font-medium text-gray-500">${team.gb}</div>
                        </div>`;
            });
            html += `</div></div>`;
            container.innerHTML = html;
        }

        // 🔥 날려먹었던 배너 로직 완벽 복구 🔥
        let currentBanner = 0;
        let totalBanners = 1;
        let bannerInterval;
        let isPlaying = true;

        function updateBannerDots(index) {
            const dots = document.querySelectorAll('.banner-dot');
            dots.forEach((dot, i) => {
                if (i === index) {
                    dot.classList.remove('w-1.5', 'bg-gray-500');
                    dot.classList.add('w-3', 'bg-white');
                } else {
                    dot.classList.remove('w-3', 'bg-white');
                    dot.classList.add('w-1.5', 'bg-gray-500');
                }
            });
        }

        function startBannerAutoScroll() {
            clearInterval(bannerInterval);
            if (!isPlaying || totalBanners <= 1) return;
            const carousel = document.getElementById('banner-carousel');
            bannerInterval = setInterval(() => {
                if(!carousel) return;
                currentBanner = (currentBanner + 1) % totalBanners;
                carousel.scrollTo({ left: currentBanner * carousel.clientWidth, behavior: 'smooth' });
                updateBannerDots(currentBanner);
            }, 3000);
        }

        function renderBanners() {
            const carousel = document.getElementById('banner-carousel');
            if(!carousel) return;
            carousel.innerHTML = '';

            const now = new Date();
            let validMatches = scheduleData.filter(match => {
                if (selectedTeam !== 'all' && match.team1 !== selectedTeam && match.team2 !== selectedTeam) return false;
                const matchStart = new Date(`${match.date}T${match.time}:00`);
                const matchEnd = new Date(matchStart.getTime() + 5 * 60 * 60 * 1000);
                return now < matchEnd;
            });

            let topMatches = [];
            if (validMatches.length > 0) {
                if (selectedTeam === 'all') {
                    const firstDate = validMatches[0].date;
                    topMatches = validMatches.filter(m => m.date === firstDate);
                } else {
                    topMatches = validMatches.slice(0, 3);
                }
            }

            // D-Day 배너 강제 추가
            const opening = new Date(2026, 2, 28);
            const diff = opening.getTime() - now.getTime();
            const dDay = Math.ceil(diff / (1000 * 60 * 60 * 24));
            let dDayText = dDay > 0 ? `D-${dDay}` : (dDay === 0 ? 'D-Day' : `D+${Math.abs(dDay)}`);

            carousel.innerHTML += `
                <div class="min-w-full bg-[#1C1C1E] rounded-2xl p-5 border border-white/5 shrink-0 flex justify-between items-center transition-transform active:scale-[0.98] snap-center">
                    <div class="flex flex-col">
                        <span class="text-[11px] font-bold text-point mb-1.5 tracking-wide">2026 KBO LEAGUE</span>
                        <h2 class="text-white/80 text-[13px] font-bold tracking-tight mb-0.5">정규시즌 개막까지</h2>
                        <div id="d-day-count" class="text-[34px] font-extrabold text-white leading-none tracking-tighter">${dDayText}</div>
                    </div>
                    <div class="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center border border-white/5">
                        <i class="fa-solid fa-baseball text-xl text-gray-400"></i>
                    </div>
                </div>`;

            topMatches.forEach(match => {
                const hex1 = teamHex[match.team1] || '#888888';
                const hex2 = teamHex[match.team2] || '#888888';
                const d = new Date(match.date);
                const days = ['일', '월', '화', '수', '목', '금', '토'];
                const dateStr = `${d.getMonth()+1}. ${d.getDate()} (${days[d.getDay()]}) ${match.time}`;

                const div = document.createElement('div');
                div.className = 'min-w-full bg-[#18181b] rounded-2xl border border-white/5 shrink-0 p-5 transition-transform active:scale-[0.98] snap-center relative overflow-hidden shadow-lg';
                div.innerHTML = `
                    <div class="absolute inset-0 pointer-events-none z-0" style="background: linear-gradient(135deg, ${hex1}80 0%, ${hex2}80 100%); opacity: 0.85;"></div>
                    <div class="flex justify-between items-center mb-5 relative z-10">
                        <div class="flex items-center gap-1.5">
                            <div class="w-1 h-3 rounded-sm" style="background-color: ${hex2}"></div>
                            <span class="text-[11px] font-extrabold text-white tracking-wider">${match.stadium}</span>
                        </div>
                        <span class="text-[10px] text-gray-300 font-medium bg-white/5 px-2 py-0.5 rounded-lg border border-white/5 tracking-wide">${dateStr}</span>
                    </div>
                    <div class="flex justify-between items-center relative z-10">
                        <div class="flex items-center gap-3 w-[42%]">
                            <img src="${teamLogos[match.team1]}" class="w-[42px] h-[42px] object-contain drop-shadow-md">
                            <div class="flex flex-col">
                                <span class="text-[9px] text-gray-300 font-bold mb-0.5 tracking-wider">AWAY</span>
                                <span class="text-[15px] font-bold text-white tracking-wide">${match.team1}</span>
                            </div>
                        </div>
                        <div class="flex justify-center w-[16%]">
                            <span class="text-[11px] font-black text-gray-300 tracking-wider">VS</span>
                        </div>
                        <div class="flex items-center justify-end gap-3 w-[42%] text-right">
                            <div class="flex flex-col">
                                <span class="text-[9px] text-gray-300 font-bold mb-0.5 tracking-wider">HOME</span>
                                <span class="text-[15px] font-bold text-white tracking-wide">${match.team2}</span>
                            </div>
                            <img src="${teamLogos[match.team2]}" class="w-[42px] h-[42px] object-contain drop-shadow-md">
                        </div>
                    </div>`;
                carousel.appendChild(div);
            });

            totalBanners = carousel.children.length;
            const dotsContainer = document.getElementById('banner-dots-container');
            if(dotsContainer) {
                dotsContainer.innerHTML = '';
                for(let i=0; i<totalBanners; i++) {
                    const dot = document.createElement('div');
                    dot.className = `banner-dot w-${i===currentBanner?'3':'1.5'} h-1.5 rounded-full ${i===currentBanner?'bg-white':'bg-gray-500'} transition-all duration-300`;
                    dotsContainer.appendChild(dot);
                }
            }
            if (currentBanner >= totalBanners) currentBanner = 0;
            updateBannerDots(currentBanner);
            startBannerAutoScroll();
        }

        function navigateCalendar(offset) { currentDate.setMonth(currentDate.getMonth() + offset); renderCalendar(); closeBottomSheet(); }

        // 🔥 매치 센터 (라인업 & 실시간 점수 상세 팝업) 🔥
        function openLineupPopup(matchId) {
            currentPopupMatchId = matchId; // 팝업 열 때 현재 열려있는 경기 ID를 기억함 (실시간 업데이트 용)
            if (navigator.vibrate) navigator.vibrate(5);
            const popup = document.getElementById('lineup-popup');
            const bg = document.getElementById('lineup-popup-bg');
            const sheet = document.getElementById('lineup-popup-sheet');
            
            popup.classList.remove('hidden'); popup.classList.add('flex');
            setTimeout(() => { bg.classList.remove('opacity-0', 'pointer-events-none'); bg.classList.add('opacity-100', 'pointer-events-auto'); sheet.classList.remove('translate-y-full'); }, 10);

            renderPopupContent(matchId);
        }

        // 팝업 내부 콘텐츠를 그리는 함수 (onSnapshot 감지로 인해 실시간으로 여러 번 불릴 수 있음)
        function renderPopupContent(matchId) {
            const content = document.getElementById('lineup-content');
            const match = scheduleData.find(m => m.id === parseInt(matchId) || m.id === matchId);
            if (!match) return;

            const live = liveDataStore[matchId];

            const logo1 = teamLogos[match.team1] ? `<img src="${teamLogos[match.team1]}" class="w-14 h-14 object-contain drop-shadow-lg mb-2">` : `<div class="w-14 h-14 rounded-full ${teamColors[match.team1]} flex items-center justify-center text-white font-bold mb-2">${match.team1}</div>`;
            const logo2 = teamLogos[match.team2] ? `<img src="${teamLogos[match.team2]}" class="w-14 h-14 object-contain drop-shadow-lg mb-2">` : `<div class="w-14 h-14 rounded-full ${teamColors[match.team2]} flex items-center justify-center text-white font-bold mb-2">${match.team2}</div>`;

            // 1. 파이어베이스에 데이터가 아예 없는 경우 (경기 시작 전)
            if (!live) {
                content.innerHTML = `
                    <div class="flex justify-between items-center mb-8 px-2 mt-2">
                        <div class="flex flex-col items-center w-[40%]">${logo1}<span class="text-[15px] font-black text-white">${match.team1}</span></div>
                        <span class="text-2xl font-black text-gray-700">VS</span>
                        <div class="flex flex-col items-center w-[40%]">${logo2}<span class="text-[15px] font-black text-white">${match.team2}</span></div>
                    </div>
                    <div class="flex flex-col items-center justify-center h-48 text-gray-400 mt-4 gap-3 bg-white/5 rounded-2xl border border-white/5">
                        <i class="fa-solid fa-clipboard-question text-4xl text-gray-500 mb-2"></i>
                        <span class="text-lg font-bold text-white tracking-wide">라인업 미발표</span>
                        <span class="text-[12px] text-gray-500 text-center">선발 라인업은<br>경기 시작 1~2시간 전에 공개됩니다.</span>
                    </div>`;
                return;
            }

            // 2. 점수판 영역 (경기 중이면 중앙에 큼지막한 실시간 점수 표시)
            let scoreCenterHtml = `<span class="text-2xl font-black text-gray-700">VS</span>`;
            if (live.gameStatus !== '경기전') {
                scoreCenterHtml = `
                    <div class="flex flex-col items-center gap-1">
                        <span class="text-[11px] font-bold text-white bg-red-600 px-2 py-0.5 rounded-full ${live.gameStatus !== '종료' ? 'live-badge' : 'bg-gray-600'}">${live.gameStatus}</span>
                        <div class="flex items-center gap-2 mt-2">
                            <span class="text-3xl font-black ${live.awayScore > live.homeScore ? 'text-point' : 'text-white'}">${live.awayScore}</span>
                            <span class="text-xl text-gray-500">:</span>
                            <span class="text-3xl font-black ${live.homeScore > live.awayScore ? 'text-point' : 'text-white'}">${live.homeScore}</span>
                        </div>
                    </div>`;
            }

            // 3. 전체 팝업 레이아웃 렌더링
            content.innerHTML = `
                <!-- 매치업 & 점수 -->
                <div class="flex justify-between items-center mb-8 px-2 mt-2">
                    <div class="flex flex-col items-center w-[30%]">
                        ${logo1}
                        <span class="text-[15px] font-black text-white tracking-wider">${match.team1}</span>
                        <span class="text-[10px] font-bold text-gray-500 tracking-widest mt-0.5">AWAY</span>
                    </div>
                    <div class="flex flex-col items-center justify-center w-[40%]">
                        ${scoreCenterHtml}
                    </div>
                    <div class="flex flex-col items-center w-[30%]">
                        ${logo2}
                        <span class="text-[15px] font-black text-white tracking-wider">${match.team2}</span>
                        <span class="text-[10px] font-bold text-gray-500 tracking-widest mt-0.5">HOME</span>
                    </div>
                </div>
                
                <!-- 선발 투수 -->
                <div class="bg-white/5 rounded-2xl p-4 mb-8 border border-white/5 shadow-inner">
                    <div class="flex justify-center mb-3"><span class="text-[10px] font-bold text-white bg-white/10 px-3 py-1 rounded-full border border-white/10 tracking-widest">선발 투수</span></div>
                    <div class="flex justify-between items-center">
                        <div class="flex-1 text-center font-bold text-white text-sm">${live.awayPitcher}</div>
                        <div class="w-px h-6 bg-white/10 mx-4"></div>
                        <div class="flex-1 text-center font-bold text-white text-sm">${live.homePitcher}</div>
                    </div>
                </div>
                
                <!-- 선발 타자 라인업 -->
                <div class="flex justify-center mb-4"><span class="text-[10px] font-bold text-gray-400 tracking-widest">선발 타자 라인업</span></div>
                <div class="flex gap-4">
                    <div class="flex-1 flex flex-col gap-2">
                        ${(live.awayLineup && live.awayLineup.length > 0) ? live.awayLineup.map((p, i) => `<div class="bg-white/5 rounded-xl px-3 py-2.5 flex items-center gap-3 border border-white/5 shadow-sm"><span class="w-4 text-center text-[11px] font-black text-point opacity-80">${i+1}</span><span class="text-[13px] font-bold text-gray-200">${p}</span></div>`).join('') : '<div class="text-center text-xs text-gray-500 py-4">라인업 정보 없음</div>'}
                    </div>
                    <div class="flex-1 flex flex-col gap-2">
                        ${(live.homeLineup && live.homeLineup.length > 0) ? live.homeLineup.map((p, i) => `<div class="bg-white/5 rounded-xl px-3 py-2.5 flex items-center gap-3 border border-white/5 shadow-sm"><span class="w-4 text-center text-[11px] font-black text-point opacity-80">${i+1}</span><span class="text-[13px] font-bold text-gray-200">${p}</span></div>`).join('') : '<div class="text-center text-xs text-gray-500 py-4">라인업 정보 없음</div>'}
                    </div>
                </div>
            `;
        }

        function closeLineupPopup() {
            currentPopupMatchId = null; // 팝업 닫을 때 ID를 초기화해서 백그라운드 렌더링을 막음
            const popup = document.getElementById('lineup-popup'); const bg = document.getElementById('lineup-popup-bg'); const sheet = document.getElementById('lineup-popup-sheet');
            bg.classList.remove('opacity-100', 'pointer-events-auto'); bg.classList.add('opacity-0', 'pointer-events-none'); sheet.classList.add('translate-y-full');
            setTimeout(() => { popup.classList.add('hidden'); popup.classList.remove('flex'); }, 300);
        }

        // 앱 구동 시작점!
        window.onload = async () => {
            await syncWithFirestore(); // 서버 데이터 연동부터 시작
            setTeamFilter(selectedTeam);
            switchTab(0);
            renderBanners(); // 배너 초기화

            // 스와이프로 넘길 때 점이랑 싱크 맞추는 리스너 추가
            const bannerCarousel = document.getElementById('banner-carousel');
            if (bannerCarousel) {
                bannerCarousel.addEventListener('scroll', () => {
                    const scrollPos = bannerCarousel.scrollLeft;
                    const width = bannerCarousel.clientWidth;
                    if (width === 0) return;
                    const newIndex = Math.round(scrollPos / width);
                    if (newIndex !== currentBanner) {
                        currentBanner = newIndex;
                        updateBannerDots(currentBanner);
                    }
                });
                bannerCarousel.addEventListener('touchstart', () => clearInterval(bannerInterval), {passive: true});
                bannerCarousel.addEventListener('touchend', () => { if (isPlaying) startBannerAutoScroll(); }, {passive: true});
            }
        };
    </script>
</body>
</html>
