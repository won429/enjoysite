<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>엔조이 공식 홈페이지</title>
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" href="icon.png">
    <style>
        :root {
            color-scheme: dark;
            --bg: #050505;
            --text: #f7f7f8;
            --muted: #b2b7c2;
            --line: rgba(255, 255, 255, 0.16);
            --accent: #f4d35e;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            min-height: 100%;
            margin: 0;
        }

        body {
            display: grid;
            place-items: center;
            min-height: 100vh;
            padding: 64px;
            background:
                linear-gradient(140deg, rgba(244, 211, 94, 0.12), transparent 34%),
                linear-gradient(320deg, rgba(63, 136, 197, 0.12), transparent 38%),
                var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", sans-serif;
            text-align: center;
            word-break: keep-all;
        }

        main {
            width: min(100%, 980px);
            padding: 24px 0;
        }

        .logo {
            width: 84px;
            height: 84px;
            margin: 0 auto 34px;
            border-radius: 20px;
            box-shadow: 0 18px 42px rgba(0, 0, 0, 0.42);
        }

        h1 {
            margin: 0;
            font-size: clamp(44px, 5vw, 76px);
            line-height: 1.15;
            letter-spacing: 0;
            font-weight: 850;
        }

        p {
            margin: 28px auto 0;
            color: var(--muted);
            font-size: clamp(20px, 2vw, 28px);
            line-height: 1.62;
            font-weight: 650;
        }

        a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 60px;
            margin-top: 42px;
            padding: 0 30px;
            border: 1px solid var(--line);
            border-radius: 999px;
            background: var(--text);
            color: #111111;
            font-size: 18px;
            font-weight: 800;
            text-decoration: none;
            box-shadow: 0 18px 36px rgba(0, 0, 0, 0.28);
            transition: transform 160ms ease, box-shadow 160ms ease;
        }

        a:hover {
            transform: translateY(-2px);
            box-shadow: 0 24px 46px rgba(0, 0, 0, 0.32);
        }

        a:active {
            transform: translateY(0) scale(0.98);
        }

        a:focus-visible {
            outline: 3px solid var(--accent);
            outline-offset: 5px;
        }

        @media (max-width: 760px) {
            body {
                padding: 28px;
            }

            main {
                padding: 20px 0;
            }

            .logo {
                width: 72px;
                height: 72px;
            }
        }
    </style>
</head>
<body>
    <main>
        <img class="logo" src="icon.png" alt="엔조이">
        <h1>내가 문닫았다고 했잖아,<br>뭘 또 들어오니?</h1>
        <p>들어왔으니까 캡처해서 단톡에 사진 보내라.<br>선물을 주지.</p>
        <a href="https://won429.github.io/enjoy/">음악은 들으러 갈란다.</a>
    </main>
</body>
</html>
