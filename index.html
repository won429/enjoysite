<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>엔조이</title>
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" href="icon.png">
    <style>
        :root {
            color-scheme: dark;
            --bg: #050505;
            --text: #f7f7f8;
            --muted: #a8adb7;
            --line: rgba(255, 255, 255, 0.14);
            --accent: #f4d35e;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            min-height: 100%;
            margin: 0;
        }

        body {
            display: grid;
            place-items: center;
            min-height: 100dvh;
            padding: 28px;
            background:
                radial-gradient(circle at 18% 18%, rgba(244, 211, 94, 0.18), transparent 34%),
                radial-gradient(circle at 80% 76%, rgba(63, 136, 197, 0.16), transparent 34%),
                var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", sans-serif;
            text-align: center;
            word-break: keep-all;
        }

        main {
            width: min(100%, 560px);
        }

        .logo {
            width: 72px;
            height: 72px;
            margin: 0 auto 28px;
            border-radius: 18px;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.42);
        }

        h1 {
            margin: 0;
            font-size: clamp(30px, 8vw, 56px);
            line-height: 1.16;
            letter-spacing: 0;
            font-weight: 850;
        }

        p {
            margin: 22px auto 0;
            color: var(--muted);
            font-size: clamp(17px, 4vw, 22px);
            line-height: 1.65;
            font-weight: 650;
        }

        a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 54px;
            margin-top: 34px;
            padding: 0 24px;
            border: 1px solid var(--line);
            border-radius: 999px;
            background: var(--text);
            color: #111111;
            font-size: 17px;
            font-weight: 800;
            text-decoration: none;
            box-shadow: 0 18px 36px rgba(0, 0, 0, 0.28);
            transition: transform 160ms ease, box-shadow 160ms ease;
        }

        a:active {
            transform: scale(0.97);
            box-shadow: 0 10px 22px rgba(0, 0, 0, 0.28);
        }

        a:focus-visible {
            outline: 3px solid var(--accent);
            outline-offset: 4px;
        }
    </style>
</head>
<body>
    <main>
        <img class="logo" src="icon.png" alt="엔조이">
        <h1>내가 문닫았다고 했잖아,<br>뭘 또 들어오니?</h1>
        <p>들어왔으니까 캡처해서 단톡에 사진 보내라.<br>선물을 주지.</p>
        <a href="https://won429.github.io/enjoy/">음악은 들으러 갈란다.</a>
    </main>
</body>
</html>
