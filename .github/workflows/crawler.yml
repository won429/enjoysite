name: KBO Lineup Crawler Bot

# 언제 이 봇을 실행할지 설정하는 부분
on:
  schedule:
    # UTC 시간 기준 (한국 시간보다 9시간 느림)
    # 08:30 UTC = 한국 시간 매일 오후 5시 30분에 자동 실행! (경기 시작 1시간 전)
    - cron: '30 8 * * *'
  
  # 깃허브 웹사이트에서 내가 원할 때 수동으로 '실행' 버튼을 누를 수 있게 해줌
  workflow_dispatch:

jobs:
  run-crawler:
    runs-on: ubuntu-latest # 깃허브가 빌려주는 공짜 리눅스 컴퓨터

    steps:
      # 1. 내 깃허브 저장소의 코드(crawler.py)를 복사해 옴
      - name: Checkout Repository
        uses: actions/checkout@v3

      # 2. 파이썬 설치
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 3. 크롤링에 필요한 도구들 설치
      - name: Install Requirements
        run: |
          python -m pip install --upgrade pip
          pip install firebase-admin requests beautifulsoup4

      # 4. 내 크롤러 파일(crawler.py) 실행!
      - name: Run Crawler Script
        env:
          # 깃허브 보안 금고(Secrets)에 넣어둔 파이어베이스 키를 꺼내서 환경 변수로 주입!
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
        run: python crawler.py
