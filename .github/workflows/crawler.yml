name: KBO Lineup Crawler Bot

# 언제 이 봇을 실행할지 설정하는 부분
on:
  schedule:
    # 💡 1. 오후 1시 ~ 밤 10시까지는 15분마다 계속 실행 (한국시간 13시~22시)
    - cron: '*/15 4-13 * * *'
    
    # 💡 2. 네가 명령한 '밤 12시 50분' 실행!! (한국시간 24시 50분/새벽 0시 50분 = UTC 15시 50분)
    - cron: '50 15 * * *'
  
  # 깃허브 웹사이트에서 내가 원할 때 수동으로 '실행' 버튼을 누를 수 있게 해줌
  workflow_dispatch:

jobs:
  run-crawler:
    runs-on: ubuntu-latest # 깃허브가 빌려주는 공짜 리눅스 컴퓨터

    steps:
      # 노란색 경고 해결을 위해 v3 -> v4로 업그레이드
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 노란색 경고 해결을 위해 v4 -> v5로 업그레이드
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. 크롤링에 필요한 도구들 설치
      - name: Install Requirements
        run: |
          python -m pip install --upgrade pip
          pip install firebase-admin requests beautifulsoup4

      # 4. 내 크롤러 파일(crawler.py) 실행!
      - name: Run Crawler Script
        env:
          # 깃허브 보안 금고(Secrets)에 넣어둔 파이어베이스 키를 꺼내서 환경 변수로 주입!
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
        run: python crawler.py
