name: KBO Lineup Crawler Bot

# 언제 이 봇을 실행할지 설정하는 부분
on:
  schedule:
    # 💡 cron 시간 설정법 (UTC 기준)
    # 한국 시간(KST) 오후 1시 = UTC 04시
    # 한국 시간(KST) 밤 10시 = UTC 13시
    # 한국 시간(KST) 밤 12시(자정) = UTC 15시
    # '*/15 4-13,15 * * *' -> 한국시간 13시~22시, 그리고 자정에 15분 간격으로 미친듯이 실행!
    
    - cron: '*/15 4-13,15 * * *'
  
  # 깃허브 웹사이트에서 내가 원할 때 수동으로 '실행' 버튼을 누를 수 있게 해줌
  workflow_dispatch:

jobs:
  run-crawler:
    runs-on: ubuntu-latest # 깃허브가 빌려주는 공짜 리눅스 컴퓨터

    steps:
      # 1. 내 깃허브 저장소의 코드(crawler.py)를 복사해 옴
      - name: Checkout Repository
        uses: actions/checkout@v3

      # 2. 파이썬 설치
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 3. 크롤링에 필요한 도구들 설치
      - name: Install Requirements
        run: |
          python -m pip install --upgrade pip
          pip install firebase-admin requests beautifulsoup4

      # 4. 내 크롤러 파일(crawler.py) 실행!
      - name: Run Crawler Script
        env:
          # 깃허브 보안 금고(Secrets)에 넣어둔 파이어베이스 키를 꺼내서 환경 변수로 주입!
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
        run: python crawler.py
