name: KBO Live Score Bot

on:
  schedule:
    - cron: '*/5 * * * *' # 매 5분마다 자동으로 실행 (한국시간 기준 24시간 내내)
  workflow_dispatch: # 원할 때 강제로 실행하는 수동 버튼

# 🔥 깃허브의 Node.js 경고 잔소리를 영원히 꺼버리는 강제 변수 🔥
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 코드 가져오기
      uses: actions/checkout@v4

    - name: 파이썬 환경 세팅
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 필요한 패키지 설치
      # 🚨 다음(Daum) API 파싱을 위해 필요한 패키지만 깔끔하게 설치! 🚨
      run: |
        python -m pip install --upgrade pip
        pip install requests firebase-admin

    - name: 비밀 금고에서 열쇠 꺼내서 파일 만들기
      env:
        FIREBASE_KEY: ${{ secrets.FIREBASE_KEY }}
      run: echo "$FIREBASE_KEY" > serviceAccountKey.json

    - name: 로사의 무적 실시간 크롤러 실행!
      run: python kbo_crawler.py
