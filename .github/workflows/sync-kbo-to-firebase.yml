name: sync-kbo-to-firebase

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions schedule cron is UTC.
    # 01:00-15:55 UTC = 10:00-00:55 KST
    - cron: "*/5 1-15 * * *"

permissions:
  contents: read

concurrency:
  group: sync-kbo-to-firebase
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Firebase service account file
        shell: bash
        env:
          FIREBASE_KEY: ${{ secrets.FIREBASE_KEY }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          raw = os.environ.get("FIREBASE_KEY", "").strip()
          if not raw:
              raise SystemExit("Missing FIREBASE_KEY secret")

          path = Path("serviceAccountKey.json")
          path.write_text(raw, encoding="utf-8")
          print(f"Wrote {path}")
          PY

      - name: Sync today's KBO data
        env:
          FIREBASE_BACKEND: ${{ vars.FIREBASE_BACKEND }}
          FIREBASE_COLLECTION: ${{ vars.FIREBASE_COLLECTION }}
          FIREBASE_META_COLLECTION: ${{ vars.FIREBASE_META_COLLECTION }}
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          FIREBASE_DB_PATH: ${{ vars.FIREBASE_DB_PATH }}
          FIREBASE_META_PATH: ${{ vars.FIREBASE_META_PATH }}
          FIREBASE_SERVICE_ACCOUNT_PATH: serviceAccountKey.json
          REQUEST_SLEEP_SECONDS: "0.4"
        run: python kbo_firebase_bot.py sync-today
